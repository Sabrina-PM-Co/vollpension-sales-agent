# ─── Vollpension Sales Agent – Nginx Virtual Host ─────────────────────────────
# Datei nach /etc/nginx/sites-available/ kopieren und nach sites-enabled/ linken.
#
# SSL wird via Certbot ergänzt (certbot --nginx -d vollpensionsalesagent.sabrinapilsmatiasek.com)

server {
    listen 80;
    listen [::]:80;
    server_name vollpensionsalesagent.sabrinapilsmatiasek.com;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts für lange Agent-Runs
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }
}
