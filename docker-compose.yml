version: "3.9"

# ─── Pipedrive → Sevdesk Agent – Docker Compose ───────────────────────────────
#
# Kein eigener Reverse Proxy – Nginx läuft bereits auf dem Host.
# Der Agent bindet auf 127.0.0.1:8000, Nginx leitet von außen weiter.
#
# Starten:  docker compose up -d
# Logs:     docker compose logs -f agent
# Update:   git pull && docker compose up -d --build
# Stop:     docker compose down

services:

  # ── FastAPI Agent ────────────────────────────────────────────────────────────
  agent:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/workflow_state.db
    volumes:
      - agent_data:/data
    # Nur auf localhost erreichbar – Nginx leitet von außen weiter
    ports:
      - "127.0.0.1:8000:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  agent_data:    # SQLite workflow_state.db
